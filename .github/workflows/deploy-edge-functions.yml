name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Prepare function directory
        run: |
          mkdir -p supabase/functions/make-server-ec8fe879
          cp -r supabase/functions/server/* supabase/functions/make-server-ec8fe879/

      - name: Deploy
        run: supabase functions deploy make-server-ec8fe879 --project-ref snajrdvcwsbjqefaftsj --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
